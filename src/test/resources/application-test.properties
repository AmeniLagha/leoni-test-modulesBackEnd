# ===============================
# = DATA SOURCE (MySQL pour les tests)
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/testmodulesleonipfe?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# = JWT SECURITY (valeurs factices pour les tests)
# ===============================
application.security.jwt.secret-key=testsecretkeyfortestingpurposesonly123456789
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# = SERVER
# ===============================
server.port=8081

# ===============================
# = EMAIL (dťsactivť pour les tests)
# ===============================
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ===============================
# = LOGGING
# ===============================
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN