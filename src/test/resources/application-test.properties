# ===============================
# = BASE DE DONN…ES H2 POUR LES TESTS
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===============================
# = JWT SECURITY
# ===============================
application.security.jwt.secret-key=testSecretKeyForUnitTestsOnly123456789012345678901234567890
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# = SERVER
# ===============================
server.port=0

# ===============================
# = LOGGING (rťduit pour les tests)
# ===============================
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.example.security=WARN

# ===============================
# = EMAIL (dťsactivť pour les tests)
# ===============================
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ===============================
# = URL DE BASE
# ===============================
app.base-url=http://localhost:8081
# ===============================
# = CORS pour les tests
# ===============================
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true