# H2 Database pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Dťsactiver l'agent Java pour Mockito
spring.main.lazy-initialization=false

# Configuration Mockito pour Java 21
mockito.agent.disabled=true
# Isolation des tests
spring.jpa.properties.hibernate.connection.isolation=2

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.example.security=WARN
logging.level.org.hibernate=WARN

# Dťsactiver les initialisations automatiques
spring.sql.init.mode=never

# JWT (valeur fixe pour les tests)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Dťsactiver l'envoi de mails pour les tests
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.test-connection=false

# Dťsactiver le cache
spring.cache.type=none