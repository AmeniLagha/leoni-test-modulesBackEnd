# Configuration pour les tests - Base de donnťes H2 en mťmoire
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dťsactiver les logs pour les tests
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.example.security=WARN

# JWT Configuration pour les tests
application.security.jwt.secret-key=testSecretKeyForUnitTestsOnly123456789012345678901234567890
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Email dťsactivť pour les tests
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# URL de base pour les tests
app.base-url=http://localhost:8081