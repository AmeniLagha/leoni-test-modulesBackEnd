# ===============================
# = DOCKER PROFILE - Production
# ===============================

# Data Source
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/testmodulesleonipfe?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Server - IMPORTANT: Docker utilise le port 8081
server.port=8081

# Application URL
app.base-url=${APP_BASE_URL:http://localhost}

# Upload directory
file.upload-dir=/app/uploads
spring.web.resources.static-locations=file:/app/uploads/

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.ssl.trust=*

# Logs
logging.level.org.springframework.mail=DEBUG