# Email Configuration
# ===============================
# = EMAIL CONFIGURATION (AVEC VARIABLES)
# ===============================

# ===============================
# = GMAIL SMTP - PORT 465 (SSL)
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=25
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ✅ Utiliser SSL au lieu de TLS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ✅ Socket Factory pour SSL
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.smtp.socketFactory.port=25

# Timeouts
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Debug
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail.smtp=DEBUG
# Dans src/main/resources/application-docker.properties

spring.datasource.hikari.minimumIdle=1

spring.datasource.hikari.connectionTimeout=20000
logging.level.com.sun.mail=DEBUG
logging.level.javax.mail=DEBUG
# Logs
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail.smtp=DEBUG
# Réduire maxLifetime (par défaut 30 min, trop long)
spring.datasource.hikari.maxLifetime=300000

# Ajouter une requête de validation
spring.datasource.hikari.connectionTestQuery=SELECT 1

# Réduire le timeout d'inactivité
spring.datasource.hikari.idleTimeout=120000

# Augmenter le timeout de validation
spring.datasource.hikari.validationTimeout=5000

# Nombre maximum de connexions
spring.datasource.hikari.maximumPoolSize=10

