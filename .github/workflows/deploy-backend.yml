name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ==================== BUILD & UNIT TESTS ====================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ✅ ÉTAPE 1 : Compilation
      - name: Build
        run: mvn clean compile

      # ✅ ÉTAPE 2 : Exécuter les tests unitaires JUnit
      - name: Run JUnit Unit Tests
        run: mvn test
        env:
          SPRING_PROFILES_ACTIVE: test

      # ✅ ÉTAPE 3 : Générer le rapport JaCoCo
      - name: Generate JaCoCo Report
        run: mvn jacoco:report

      # ✅ ÉTAPE 4 : Upload rapport JaCoCo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      # ✅ ÉTAPE 5 : Package sans skip tests (les tests ont déjà été exécutés)
      - name: Package
        run: mvn package -DskipTests

      # ✅ ÉTAPE 6 : Upload JAR
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  # ==================== TESTS SELENIUM (End-to-End) ====================
  selenium-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q && sudo apt-get install -y google-chrome-stable
          echo "Chrome: $(google-chrome --version)"

      - name: Wake up Render
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.FRONTEND_URL }}" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Ready!" && break
            sleep 20
          done

      - name: Run Login Tests
        run: mvn test -Dtest=LoginTestRunner -Dapp.url=${{ secrets.FRONTEND_URL }} -Dselenium.headless=true
        continue-on-error: true

      - name: Run Register Tests
        run: mvn test -Dtest=RegisterTestRunner -Dapp.url=${{ secrets.FRONTEND_URL }} -Dselenium.headless=true
        continue-on-error: true

      - name: Run ChargeSheet Tests
        run: mvn test -Dtest=ChargeSheetTestRunner -Dapp.url=${{ secrets.FRONTEND_URL }} -Dselenium.headless=true
        continue-on-error: true

      - name: Upload Cucumber Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: target/cucumber-reports/
          retention-days: 7

  # ==================== DOCKER BUILD & RELEASE ====================
  docker-build:
    needs: selenium-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image with SigNoz
        run: |
          docker build \
            --build-arg SIGNOZ_INGESTION_KEY=${{ secrets.SIGNOZ_INGESTION_KEY }} \
            -t ${{ secrets.DOCKER_USERNAME }}/leoni-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/leoni-backend:latest \
            .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/leoni-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/leoni-backend:latest

  # ==================== DEPLOY ====================
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to Clever Cloud
        run: |
          curl -s -X POST "https://api.clever-cloud.com/v2/github/redeploy" \
            -H "Content-Type: application/json" \
            -d "{\"appId\": \"${{ secrets.CLEVER_CLOUD_APP_ID }}\", \"secret\": \"${{ secrets.CLEVER_CLOUD_SECRET }}\"}"
          echo "Deployed!"